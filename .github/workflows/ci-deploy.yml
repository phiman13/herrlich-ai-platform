name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agents/requirements.txt
      - name: Install dependencies
        run: pip install -r agents/requirements.txt
      - name: Run tests
        run: |
          PYTHONPATH=agents pytest tests/ -q --tb=short \
            --ignore=tests/test_briefing_agent.py \
            --ignore=tests/test_mail_send.py \
            --ignore=tests/test_tasks_agent.py

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/agents
            git pull
            systemctl restart jarvis
            sleep 3
            systemctl is-active --quiet jarvis \
              && echo "jarvis running" \
              || (journalctl -u jarvis -n 20 --no-pager && exit 1)
