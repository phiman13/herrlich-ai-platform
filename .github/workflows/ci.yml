name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agents/requirements.txt
      - name: Install dependencies
        run: pip install -r agents/requirements.txt pytest pytest-asyncio
      - name: Run tests
        run: |
          PYTHONPATH=agents python -m pytest tests/ -q --tb=short \
            --ignore=tests/test_briefing_agent.py \
            --ignore=tests/test_mail_send.py \
            --ignore=tests/test_tasks_agent.py
